<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="Personal academic homepage." />
    <title>Your Name</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/css/mdb.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/academicons@1.9.1/css/academicons.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="fixed-top-nav">
    <header>
      <nav id="navbar" class="navbar navbar-light navbar-expand-sm fixed-top">
        <div class="container">
          <a class="navbar-brand title font-weight-lighter tab-link" href="#" data-tab="home">
            <span class="font-weight-bold" data-content="brandStrong">Your Name</span><span data-content="brandLight"></span><span id="nav-section-label"></span>
          </a>

          <button
            class="navbar-toggler collapsed ml-auto"
            type="button"
            data-toggle="collapse"
            data-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar top-bar"></span>
            <span class="icon-bar middle-bar"></span>
            <span class="icon-bar bottom-bar"></span>
          </button>

          <div class="collapse navbar-collapse text-right" id="navbarNav">
            <ul class="navbar-nav ml-auto flex-nowrap">
              <li class="nav-item active" id="nav-home">
                <a class="nav-link tab-link" href="#" data-tab="home">About<span class="sr-only">(current)</span></a>
              </li>
              <li class="nav-item" id="nav-experience">
                <a class="nav-link tab-link" href="#" data-tab="experience">Experience</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#publications">Publications</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <div class="container mt-5">
      <div class="post">
        <header class="post-header">
          <h1 class="post-title">
            <span class="font-weight-bold" data-content="brandStrong">Your Name</span>
            <span data-content="brandLight"> | Personal Page</span>
          </h1>
          <p class="desc" data-content="description"></p>
        </header>

        <article>
          <!-- Home tab -->
          <div id="tab-home" class="tab-panel active">
            <div class="profile float-right">
              <figure>
                <picture>
                  <img
                    id="portrait"
                    src="https://avatars.githubusercontent.com/u/89365454?v=4"
                    class="img-fluid z-depth-1 rounded"
                    alt="Portrait"
                  />
                </picture>
              </figure>
              <div class="address" id="portrait-address"></div>
            </div>

            <div class="clearfix">
              <div id="intro"></div>

              <div id="focus-intro"></div>
              <ul id="focus-list"></ul>

              <h1 id="publications">Publications</h1>
              <div id="work"></div>
            </div>

          </div>

          <!-- Experience tab -->
          <div id="tab-experience" class="tab-panel">
            <div id="experience-list"></div>
          </div>
        </article>
      </div>
    </div>

    <footer class="fixed-bottom">
      <div class="container mt-0">
        &copy; Copyright <span id="footer-year"></span>
        <span id="footer-name">Your Name</span>. Powered by
        <a href="https://pages.github.com/" target="_blank" rel="noreferrer">GitHub Pages</a>.
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js" crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/js/mdb.min.js" crossorigin="anonymous"></script>
    <script src="content.js"></script>
    <script src="script.js"></script>
  </body>
</html>
